version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: blogapp_server
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - MONGO=mongodb://mongo:27017/blogapp
      - JWT_SECRET=${JWT_SECRET:-changeme_in_production}
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: blogapp_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mongo_data:
